apply plugin: 'com.android.library'

android {
    namespace 'com.example.nativescreenplugin'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // Embed third-party AAR dependencies into the output AAR via fat-aar or manual copy.
    // For UniApp plugins, list extra AARs separately in nativeplugins config.json instead.
}

repositories {
    flatDir {
        dirs 'third-party-aar'
    }
}

dependencies {
    // UniApp SDK from Maven Central — compileOnly, provided at runtime by the HBuilderX app shell
    compileOnly 'io.dcloud.unimp:uni-app-v8:4.17.2024051110'
    compileOnly 'com.alibaba:fastjson:1.1.46.android'

    // Your third-party AAR — compileOnly, listed separately in config.json
    compileOnly fileTree(dir: 'third-party-aar', include: ['*.aar'])
}
